<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>500 — Server Error</title>
  <style>
    body { margin:0; padding:0; background:#0b1e3d; color:#e8edf5; font-family:'Segoe UI',system-ui,sans-serif; }
    .container { max-width:900px; margin:60px auto; padding:0 24px; }
    h1 { color:#f5821f; font-size:28px; margin-bottom:8px; }
    p { color:#8ba4c8; font-size:15px; margin-bottom:24px; }
    .tb { background:#0a1a35; border:1px solid #1e3f7a; border-radius:10px; padding:20px; font-family:monospace; font-size:12px; line-height:1.7; color:#ff9d45; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
    .btn { display:inline-block; background:#f5821f; color:#fff; text-decoration:none; padding:10px 22px; border-radius:8px; font-size:14px; font-weight:600; margin-right:10px; }
    .btn-o { background:transparent; border:1px solid #1e3f7a; color:#8ba4c8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>500 — Internal Server Error</h1>
    <p>Something went wrong on the server. The error has been logged. Please try again or contact support.</p>
    <div style="margin-bottom:20px;">
      <a href="/dashboard" class="btn">← Back to Dashboard</a>
      <a href="javascript:history.back()" class="btn btn-o">Go Back</a>
    </div>
    {% if traceback %}
    <div class="tb">{{ traceback }}</div>
    {% endif %}
  </div>
</body>
</html>
