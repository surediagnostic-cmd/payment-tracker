{% extends "base.html" %}
{% block title %}New Payment Request{% endblock %}

{% block content %}
<div style="max-width:720px;">
  <div style="margin-bottom:28px;">
    <a href="{{ url_for('requests.dashboard') }}" style="color:var(--muted); font-size:13px; text-decoration:none; font-weight:500;">← Back to Dashboard</a>
    <div class="section-title" style="margin-top:8px;">New Payment Request</div>
    <div style="font-size:13px; color:var(--muted); margin-top:4px;">
      {{ current_user.branch.name if current_user.branch else "" }} · {{ current_user.name }}
    </div>
  </div>

  <form method="POST" action="{{ url_for('requests.new_request') }}">
    <div class="card" style="padding:28px; margin-bottom:20px;">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--orange); font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:6px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Payment Details
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
        <div>
          <label class="label">Payment Date *</label>
          <input type="date" name="date" class="inp" required/>
        </div>
        <div>
          <label class="label">Expense Category *</label>
          <select name="category_id" class="inp" required>
            <option value="">— Select category —</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div style="margin-top:18px;">
        <label class="label">Description / Item *</label>
        <input type="text" name="description" class="inp" placeholder="e.g. Lab reagents — March 2026 batch" required maxlength="255"/>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; margin-top:18px;">
        <div>
          <label class="label">Quantity *</label>
          <input type="number" name="quantity" id="qty" class="inp" placeholder="1" min="1" required value="1" oninput="calcTotal()"/>
        </div>
        <div>
          <label class="label">Unit Rate (₦) *</label>
          <input type="text" name="rate" id="rate" class="inp" placeholder="0.00" required oninput="calcTotal()"/>
        </div>
        <div>
          <label class="label">Total Amount (₦)</label>
          <div class="inp" id="total_display" style="background:var(--card2); color:var(--orange2); font-weight:800; font-size:16px; cursor:default;">0.00</div>
        </div>
      </div>
    </div>

    <div class="card" style="padding:28px; margin-bottom:20px;">
      <div style="font-size:11px; text-transform:uppercase; letter-spacing:.8px; color:var(--orange); font-weight:700; margin-bottom:18px; display:flex; align-items:center; gap:6px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Beneficiary Details
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:18px;">
        <div>
          <label class="label">Beneficiary Name *</label>
          <input type="text" name="beneficiary_name" class="inp" placeholder="Full name or company" required/>
        </div>
        <div>
          <label class="label">Account Number *</label>
          <input type="text" name="beneficiary_account" class="inp" placeholder="0123456789" required maxlength="20"/>
        </div>
        <div>
          <label class="label">Beneficiary Bank *</label>
          <select name="beneficiary_bank" class="inp" required>
            <option value="">— Select bank —</option>
            {% for bank in ["Access Bank","Ecobank","Fidelity Bank","FCMB","First Bank","GTBank","Heritage Bank","Keystone Bank","Kuda","Moniepoint","OPay","Palmpay","Polaris Bank","Providus Bank","Stanbic IBTC","Sterling Bank","UBA","Union Bank","Unity Bank","Wema Bank","Zenith Bank","Other"] %}
            <option value="{{ bank }}">{{ bank }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="label">Bank Code <span style="color:var(--dim); text-transform:none; letter-spacing:0;">(optional)</span></label>
          <input type="text" name="bank_code" class="inp" placeholder="e.g. 058" maxlength="10"/>
        </div>
      </div>
    </div>

    <div style="display:flex; gap:12px; justify-content:flex-end;">
      <a href="{{ url_for('requests.dashboard') }}" class="btn-outline">Cancel</a>
      <button type="submit" class="btn-primary" style="padding:12px 28px; font-size:15px;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="22 2 11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Submit for Approval
      </button>
    </div>
  </form>
</div>

<script>
function calcTotal() {
  const qty = parseFloat(document.getElementById('qty').value) || 0;
  const rate = parseFloat(document.getElementById('rate').value.replace(/,/g,'')) || 0;
  document.getElementById('total_display').textContent =
    (qty * rate).toLocaleString('en-NG', {minimumFractionDigits:2, maximumFractionDigits:2});
}
document.querySelector('input[name="date"]').value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
