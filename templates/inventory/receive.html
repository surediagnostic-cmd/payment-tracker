{% extends "base.html" %}
{% block title %}Receive Stock{% endblock %}
{% block page_title %}Inventory — Receive Stock{% endblock %}
{% block content %}
<div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
  <a href="{{ url_for('inventory.dashboard') }}" style="color:var(--muted); font-size:13px; text-decoration:none;">← Inventory</a>
  <span style="color:var(--dim);">/</span>
  <span style="color:var(--white); font-size:13px;">Receive Stock</span>
</div>

<div style="max-width:600px;">
  <h1 class="section-title" style="margin-bottom:6px;">Receive Stock</h1>
  <div style="color:var(--muted); font-size:13px; margin-bottom:24px;">Record incoming reagents or consumables from a supplier</div>

  <div class="card" style="padding:28px;">
    <form method="post" action="{{ url_for('inventory.receive_stock') }}">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">

        <div style="grid-column:1/-1;">
          <label class="label">Item *</label>
          <select name="item_id" class="inp" required>
            <option value="">— select item —</option>
            {% for item in all_items %}
            <option value="{{ item.id }}">{{ item.name }} ({{ item.unit }})</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="label">Branch / Location</label>
          <select name="branch_id" class="inp">
            <option value="">Central Stock</option>
            {% for b in branches %}
            <option value="{{ b.id }}">{{ b.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="label">Quantity Received *</label>
          <input name="qty" class="inp" type="number" step="0.01" min="0.01" required placeholder="e.g. 100">
        </div>

        <div>
          <label class="label">Unit Cost (₦ per unit)</label>
          <input name="unit_cost" class="inp" type="number" step="0.01" placeholder="e.g. 80.00">
        </div>

        <div>
          <label class="label">Batch / Lot Number</label>
          <input name="batch_number" class="inp" placeholder="e.g. LOT-2024-001">
        </div>

        <div>
          <label class="label">Expiry Date</label>
          <input name="expiry_date" class="inp" type="date">
        </div>

        <div style="grid-column:1/-1;">
          <label class="label">Notes</label>
          <textarea name="notes" class="inp" rows="2" placeholder="Supplier name, invoice number, etc."></textarea>
        </div>
      </div>

      <div style="display:flex; gap:10px; margin-top:22px;">
        <button type="submit" class="btn-primary">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Record Receipt
        </button>
        <a href="{{ url_for('inventory.dashboard') }}" class="btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
