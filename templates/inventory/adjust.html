{% extends "base.html" %}
{% block title %}Adjust Stock{% endblock %}
{% block page_title %}Inventory — Adjust Stock{% endblock %}
{% block content %}
<div style="display:flex; align-items:center; gap:10px; margin-bottom:24px;">
  <a href="{{ url_for('inventory.dashboard') }}" style="color:var(--muted); font-size:13px; text-decoration:none;">← Inventory</a>
  <span style="color:var(--dim);">/</span>
  <span style="color:var(--white); font-size:13px;">Adjust Stock</span>
</div>

<div style="max-width:580px;">
  <h1 class="section-title" style="margin-bottom:6px;">Stock Adjustment</h1>
  <div style="color:var(--muted); font-size:13px; margin-bottom:24px;">Record spoilage, write-offs, corrections, or manual stock counts</div>

  <div class="card" style="padding:28px;">
    <form method="post" action="{{ url_for('inventory.adjust_stock') }}">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">

        <div style="grid-column:1/-1;">
          <label class="label">Item *</label>
          <select name="item_id" class="inp" required>
            <option value="">— select item —</option>
            {% for item in all_items %}
            <option value="{{ item.id }}">{{ item.name }} ({{ item.unit }})</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="label">Branch / Location</label>
          <select name="branch_id" class="inp">
            <option value="">Central Stock</option>
            {% for b in branches %}
            <option value="{{ b.id }}">{{ b.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="label">Adjustment Type *</label>
          <select name="txn_type" class="inp">
            <option value="adjust">Correction / Stock Count</option>
            <option value="writeoff">Write-off / Spoilage / Expiry</option>
          </select>
        </div>

        <div>
          <label class="label">Quantity *</label>
          <input name="qty" class="inp" type="number" step="0.01" min="0.01" required placeholder="e.g. 5">
        </div>

        <div>
          <label class="label">Direction *</label>
          <select name="direction" class="inp">
            <option value="out">Remove from stock (−)</option>
            <option value="in">Add to stock (+)</option>
          </select>
        </div>

        <div style="grid-column:1/-1;">
          <label class="label">Reason / Notes *</label>
          <textarea name="notes" class="inp" rows="3" required placeholder="e.g. 5 strips expired — batch LOT-2024-001"></textarea>
        </div>
      </div>

      <div style="display:flex; gap:10px; margin-top:22px;">
        <button type="submit" class="btn-primary">Record Adjustment</button>
        <a href="{{ url_for('inventory.dashboard') }}" class="btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
