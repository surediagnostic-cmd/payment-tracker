services:
  - type: web
    name: sure-finance-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false          # paste your Supabase connection string here
      - key: MDS_EMAIL
        sync: false          # MDS email address for notifications
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false          # Gmail address used to send notifications
      - key: MAIL_PASSWORD
        sync: false          # Gmail App Password (not your main password)
      - key: MAIL_DEFAULT_SENDER
        sync: false          # e.g. finance@surediagnostics.com
